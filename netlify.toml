# ============================================================
# Netlify Configuration for booked.rentals
# ============================================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ----------------------------------------------------------
# BRANCH DEPLOYS
# Enable preview URLs for non-main branches.
# homepage-rebuild branch will be available at:
#   homepage-rebuild--<your-site-name>.netlify.app
# ----------------------------------------------------------
[context.branch-deploy]
  command = "npm run build"
  publish = "dist"

# ----------------------------------------------------------
# CMS ADMIN
# Sveltia CMS uses GitHub OAuth for authentication (not
# Netlify Identity). Configure OAuth in the Netlify
# dashboard under Site settings > Access & security > OAuth.
# ----------------------------------------------------------

# SPA redirect for Sveltia CMS admin panel
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# ----------------------------------------------------------
# HEADERS
# ----------------------------------------------------------
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
