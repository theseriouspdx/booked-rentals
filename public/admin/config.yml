# ============================================================
# Sveltia CMS Configuration for booked.rentals
# Docs: https://sveltiacms.app/en/docs
# ============================================================

backend:
  name: github
  repo: theseriouspdx/booked-rentals
  branch: homepage-rebuild

# Where uploaded images/files go
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Site URL for previews (branch preview while in development)
site_url: https://homepage-rebuild--booked-rentals.netlify.app
display_url: https://homepage-rebuild--booked-rentals.netlify.app

# ============================================================
# CONTENT COLLECTIONS
# ============================================================

collections:

  # ----------------------------------------------------------
  # ARTICLES
  # ----------------------------------------------------------
  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sort: "date:desc"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Guest Management"
          - "Pricing & Revenue"
          - "Automation & Tools"
          - "Property Setup"
          - "Reviews & Ratings"
          - "Legal & Insurance"
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary for cards and SEO (1-2 sentences)" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Show on homepage?" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Body", name: "body", widget: "markdown" }

  # ----------------------------------------------------------
  # PRODUCTS
  # ----------------------------------------------------------
  - name: "products"
    label: "Products"
    folder: "src/content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "One-Line Review", name: "review", widget: "string", hint: "Your personal take in one sentence" }
      - label: "Rating"
        name: "rating"
        widget: "select"
        options: ["5", "4.5", "4", "3.5", "3"]
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Smart Home"
          - "Pricing Tools"
          - "Cleaning & Maintenance"
          - "Guest Communication"
          - "Safety & Security"
          - "Furniture & Design"
      - { label: "Product Image", name: "image", widget: "image", required: false }
      - { label: "Affiliate Link", name: "affiliate_url", widget: "string", required: false, hint: "Your affiliate URL for this product" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Show on homepage?" }
      - { label: "Body", name: "body", widget: "markdown", hint: "Full review / write-up" }

  # ----------------------------------------------------------
  # TOPICS (content categories shown on homepage)
  # ----------------------------------------------------------
  - name: "topics"
    label: "Topics"
    folder: "src/content/topics"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", hint: "Short description shown on topic card" }
      - { label: "Icon (SVG)", name: "icon", widget: "text", hint: "Paste SVG markup for the topic icon" }
      - { label: "Visible", name: "visible", widget: "boolean", default: true, hint: "Show this topic on the homepage?" }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 0, hint: "Lower numbers appear first" }

  # ----------------------------------------------------------
  # NEWS
  # ----------------------------------------------------------
  - name: "news"
    label: "News"
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sort: "date:desc"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary (1-2 sentences)" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Body", name: "body", widget: "markdown" }

  # ----------------------------------------------------------
  # SITE SETTINGS (singleton)
  # ----------------------------------------------------------
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "public/content/settings.yml"
        fields:
          - { label: "Site Title", name: "title", widget: "string", default: "booked.rentals" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "Smart hosting starts with real experience" }
          - { label: "Hero Badge Text", name: "hero_badge", widget: "string", default: "From a 16x Superhost with 315+ Five-Star Reviews", hint: "Shown above the logo in the header banner" }
          - { label: "Hero Headline", name: "hero_headline", widget: "string", default: "Smart hosting starts with" }
          - { label: "Hero Headline Emphasis", name: "hero_headline_emphasis", widget: "string", default: "real experience", hint: "Shown in gradient text after the headline" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text", default: "Strategies, automation, and guides for short-term rental hosts who want higher ratings, better guests, and less time on the grind." }
          - { label: "Hero CTA Button Text", name: "hero_cta_button", widget: "string", default: "Get Early Access" }
          - { label: "Hero Disclaimer", name: "hero_disclaimer", widget: "string", default: "Be first to know when we launch. No spam, ever." }
          - { label: "Email List CTA Headline", name: "cta_headline", widget: "string", default: "Get the guide that 5-star hosts swear by" }
          - { label: "Email List CTA Button Text", name: "cta_button_text", widget: "string", default: "Get the Guide" }
          - { label: "Email List Subscriber Count", name: "subscriber_count", widget: "string", default: "2,000+" }
          - { label: "Pinterest URL", name: "pinterest_url", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
